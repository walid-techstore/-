<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
    body { font-family: sans-serif; background: #f0f2f5; margin: 1px; }
    .main { display: flex; gap: 2px; }
    .card { background: white; padding: 4px; flex: 1; border: 3px solid #ddd; border-radius: 5px; }
    
    /* فرض الترتيب الصحيح للأرقام ومنع قلبها */
    .num-display { 
        display: inline-block; 
        direction: ltr; 
        unicode-bidi: bidi-override; 
        text-align: right; 
    }
    
    #a { width: 100%; padding: 25px; font-size: 60px; border: 8px solid #28a745; border-radius: 8px; text-align: center; font-weight: 900; margin-bottom: 5px; direction: ltr; }
    h2 { font-size: 35px; text-align: center; color: #28a745; margin: 2px 0; border-bottom: 4px solid #eee; }
    .row { font-size: 24px; font-weight: 900; margin: 2px 0; padding: 6px; border-bottom: 3px solid #eee; }
    .val { color: #d9534f; font-size: 26px; }
    .cash-val { color: #007bff; font-size: 26px; font-weight: bold; }
    .monthly-val { color: #28a745; font-size: 35px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    
    /* إضافة الحقوق */
    .footer { text-align: center; margin-top: 20px; color: #888; font-size: 14px; font-family: sans-serif; }
</style>
</head>
<body>

<input type="text" id="a" placeholder="المبلغ..." oninput="updateDisplay(this)">

<div class="main">
    <div class="card" id="r1"><h2>البطالة</h2></div>
    <div class="card" id="r2"><h2>موظف/متقاعد</h2></div>
</div>

<div class="footer">Made by WaLiD_TechStore</div>

<script>
function formatCorrectly(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "\u00A0");
}

function updateDisplay(el) {
    let raw = el.value.replace(/\u00A0/g, '').replace(/\s/g, '').replace(/\D/g, '');
    if (raw !== "") {
        el.value = formatCorrectly(raw);
    } else {
        el.value = "";
    }
    c(raw);
}

function c(rawVal){
    let a = parseFloat(rawVal) || 0;
    
    let unemp = [
        {n:"(22-24) 3أشهر", m:3, limit:38000, x:1.3}, 
        {n:"(25-26) 4أشهر", m:4, limit:48000, x:1.4}
    ];
    
    let empItems = [
        {n:"3أشهر", m:3, x:1.26}, {n:"12شهر", m:12, x:1.68},
        {n:"6أشهر", m:6, x:1.38}, {n:"18شهر", m:18, x:1.98},
        {n:"9أشهر", m:9, x:1.53}, {n:"", m:0, x:0}
    ];
    
    let h1="<h2>البطالة</h2>", h2="<h2>موظف/متقاعد</h2><div class='grid'>";
    
    unemp.forEach(o=>{
        let calcBase = Math.min(a, o.limit);
        let cash = Math.max(0, a - o.limit);
        let total = Math.round((calcBase * o.x) / 100) * 100;
        let monthly = Math.round((total/o.m)/100)*100;
        
        h1+=`<div class='row'>${o.n}<br>الكاش: <span class='num-display cash-val'>${formatCorrectly(cash)}</span><br>الإجمالي: <span class='num-display val'>${formatCorrectly(total)}</span><br>القسط: <span class='num-display monthly-val'>${formatCorrectly(monthly)}</span></div>`;
    });
    
    empItems.forEach(o=>{
        if(o.m === 0) { h2+=`<div></div>`; return; }
        let v = Math.round((a * o.x) / 100) * 100;
        let monthly = Math.round((v/o.m)/100)*100;
        h2+=`<div class='row'>${o.n}<br>الإجمالي: <span class='num-display val'>${formatCorrectly(v)}</span><br>القسط: <span class='num-display monthly-val'>${formatCorrectly(monthly)}</span></div>`;
    });
    
    document.getElementById('r1').innerHTML=h1;
    document.getElementById('r2').innerHTML=h2+"</div>";
}
</script>
</body>
</html>
