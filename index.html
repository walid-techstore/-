<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { font-family: sans-serif; background: #f0f2f5; margin: 10px; }
    
    .top-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    input { 
        flex: 1; min-width: 250px; padding: 20px; font-size: 30px; 
        border: 4px solid #28a745; border-radius: 8px; text-align: center; 
        font-weight: 900; direction: ltr;
    }
    
    .main { display: flex; flex-wrap: wrap; gap: 10px; }
    .card { background: white; padding: 15px; flex: 1; min-width: 300px; border: 2px solid #ddd; border-radius: 10px; }
    
    h2 { font-size: 28px; text-align: center; color: #28a745; margin-bottom: 10px; }
    .row { font-size: 30px; font-weight: 900; padding: 10px; border-bottom: 2px solid #eee; line-height: 1.5; }
    
    .val { color: #d9534f; }
    .cash-val { color: #007bff; }
    .monthly-val { color: #28a745; font-size: 40px; }
    .num { direction: ltr; display: inline-block; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    .footer { text-align: center; margin-top: 30px; font-size: 18px; color: #555; font-weight: bold; }
</style>
</head>
<body>

<div class="top-container">
    <input type="text" id="a" placeholder="المبلغ" oninput="formatInput(this); calc()">
    <input type="text" id="d" placeholder="الدفعة" oninput="formatInput(this); calc()">
</div>

<div class="main">
    <div class="card" id="r1"><h2>البطالة</h2><div id="unemp-box"></div></div>
    <div class="card" id="r2"><h2>موظف/متقاعد</h2><div class="grid" id="emp-box"></div></div>
</div>

<div class="footer">Made by WaLiD_Tech</div>

<script>
function formatInput(el) {
    let val = el.value.replace(/\s/g, '').replace(/\D/g, '');
    el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
}

function formatNum(num) {
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
}

function calc() {
    let a = parseFloat(document.getElementById('a').value.replace(/\s/g, '')) || 0;
    let d = parseFloat(document.getElementById('d').value.replace(/\s/g, '')) || 0;
    let rem = Math.max(0, a - d);
    
    let unemp = [{n:"(مستفيد عام: 22 24) 3أشهر", m:3, limit:38000, x:1.3}, {n:"(مستفيد عام: 25 26) 4أشهر", m:4, limit:48000, x:1.4}];
    let emp = [{n:"3أشهر", m:3, x:1.26}, {n:"6أشهر", m:6, x:1.38}, {n:"9أشهر", m:9, x:1.53}, {n:"12شهر", m:12, x:1.68}, {n:"18شهر", m:18, x:1.98}];
    
    let h1="", h2="";
    unemp.forEach(o=>{
        let c = Math.max(0, rem - o.limit);
        let t = Math.ceil((Math.min(rem, o.limit) * o.x) / 100) * 100;
        h1+=`<div class='row'>${o.n}<br>الكاش: <span class='cash-val num'>${formatNum(c)}</span><br>الإجمالي: <span class='val num'>${formatNum(t)}</span><br>القسط: <span class='monthly-val num'>${formatNum(Math.ceil((t/o.m)/100)*100)}</span></div>`;
    });
    
    emp.forEach(o=>{
        let v = Math.ceil((rem * o.x) / 100) * 100;
        h2+=`<div class='row'>${o.n}<br>الإجمالي: <span class='val num'>${formatNum(v)}</span><br>القسط: <span class='monthly-val num'>${formatNum(Math.ceil((v/o.m)/100)*100)}</span></div>`;
    });
    
    document.getElementById('unemp-box').innerHTML=h1;
    document.getElementById('emp-box').innerHTML=h2;
}
</script>
</body>
</html>
